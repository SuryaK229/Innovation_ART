<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons on Image</title>
    <style>
        /* Style for the container div */
        .image-container {
            position: relative;
            width: 100%;
            
            margin: auto;
        }

        /* Style for the image */
        .background-image {
            width: 100%;
            height: auto;
            display: block;
            width: -webkit-fill-available;
            height: 800px;
        }

        /* Style for the box */
        .button-box {
            position: absolute;
            top: 80%; /* Adjust the top position as needed */
            left: 40%; /* Adjust the left position as needed */
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8); /* Adjust the background color and opacity */
            border: 2px solid #333; /* Optional border for the box */
            text-align: center;
        }

        /* Style for the buttons */
        .button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            cursor: pointer;
            margin: 0 10px;
        }

        /* Style for the second button */
        .button2 {
            background-color: #008CBA;
        }
    </style>
</head>
<body>

<!-- Container for the image and box with buttons -->
<div class="image-container">
    <!-- Image as a background -->
    <img src="./Edited_files/logo.png" alt="Background Image" class="background-image">

    <!-- Box with buttons -->
    <div class="button-box">
        <!-- Button 1 -->
        <button class="button" onclick="button1Clicked()">Sign Up</button>

        <!-- Button 2 -->
        <button class="button button2" onclick="button2Clicked()">Login</button>
    </div>
</div>

<script>
    // JavaScript functions to handle button clicks
    function button1Clicked() {
        window.location.href = 'signup.html';
    }

    function button2Clicked() {
        window.location.href = 'login.html';
    }
</script>



</body></html>
