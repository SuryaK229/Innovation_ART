<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOOK APPOINTMENTS TIME</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80vh;
      margin: 0;
      background-color: #f5f5f5;
    }

    .datetime-container {
      display: flex;
      justify-content: space-between;
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      height: 300px;
      width: 300px;
    }

    .datepicker,
    .timepicker {
      width: 45%; /* Adjust as needed */
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }

    button {
      background-color: #4caf50;
      color: #fff;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
  <h3 style="padding-right: 20px;">SELECT DATE AND TIME TO BOOK APPOINTMENTS: </h3>
</head>

<body>
    <form action="confirmappointment.html">
        <div class="datetime-container">
    
            <input type="date" class="datepicker" id="datepicker" required>
            <input type="time" class="timepicker" id="timepicker" required>
          </div>
         <div style="padding-top: 20px">
            <button onclick="getDateTime()" style="margin-left: 100px;">Get Date and Time</button>

         </div>
         
          <div class="input-group">
            <button type="submit" style="background-color: #4CAF50;color: white;margin-left: 500px;">Next</button>
          </div>

          

    </form>
    
  

  <script>
    function getDateTime() {
      var dateValue = document.getElementById('datepicker').value;
      var timeValue = document.getElementById('timepicker').value;
      alert('Selected Date: ' + dateValue + '\nSelected Time: ' + timeValue);
    }
  </script>

</body>
</html>
